<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servidor Iniciado</title>
  <style>
    @keyframes animateBackground {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      background: linear-gradient(to right, #00ffbf, #4d79ff);
      background-size: 200% 200%;
      animation: animateBackground 5s infinite;
    }
    section {
      padding: 50px;
      color: #ffffff;
    }
    
    footer {
      background-color: rgba(0, 0, 0, 0.1);
      padding: 10px;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
    }
    
    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }
    
    p.twitter {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <section>
    <h1>Servidor Iniciado</h1>
    <p>No se aceptan más peticiones</p>
    <p class="twitter">Si quieres seguir la información de Instakill 2, síguenos en <a href="https://twitter.com/Instakill2SMP">Twitter</a>.</p>
  </section>
  
  <footer>
    <p>Desarrollo web por Andrip &copy; Instakill 2 2023</p>
  </footer>
</body>
</html>
